# Workflow that runs license check for used dependencies
name: dependency-review

on:
  pull_request:

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-dependency-review@b088b94cad35e50b197104c9e2ac8fb25a7116b3 # v1.0.33
