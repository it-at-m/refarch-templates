# Workflow for scanning GitHub workflows with actionlint
name: actionlint

on:
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-actionlint@acb09213786b76dd7aa52ec1d901390d28c60eb0 # v1.0.29
