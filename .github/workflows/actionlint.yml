# Workflow for scanning GitHub workflows with actionlint
name: Actionlint

on:
  # Runs on pull requests
  pull_request:

jobs:
  actionlint:
    name: Run actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-actionlint@94f7e40aa557a2790abfa98a9cc9186d260b94f8 # v1.0.27
