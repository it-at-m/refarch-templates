# Workflow to build docs and deploy docs folder to GitHub pages
name: deploy-docs

on:
  # Runs on pushes to any branch when changes are made to docs or workflow
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-build-docs@699d5d46ed8bcce2227e2d58101d1dde7a713d53 # v1.2.0
      # Only deploy documentation from the main branch to prevent unauthorized changes
      - uses: it-at-m/lhm_actions/action-templates/actions/action-deploy-docs@699d5d46ed8bcce2227e2d58101d1dde7a713d53 # v1.2.0
