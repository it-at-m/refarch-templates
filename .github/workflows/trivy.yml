# Workflow for running security scan using Trivy
name: trivy

on:
  pull_request:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to the GitHub Security tab
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-trivy@1a673d9c3be4a4f59cf29f425bc2b00fc42751fd # v1.0.32
