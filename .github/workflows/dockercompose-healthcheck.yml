name: Docker Compose Healthcheck

on:
  # Runs on pull requests
  pull_request:

jobs:
  docker-compose-healthcheck:
    name: Run docker compose healthcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-dockercompose-healthcheck@992204b33cb6a9766bbc8bc57ccd1460c4bf1aa9 # v1.0.26
        with:
          skip-exited: true # required for keycloakmigration init container
          compose-file-path: "./stack/"
