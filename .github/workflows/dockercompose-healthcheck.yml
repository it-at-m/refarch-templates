name: Docker Compose Healthcheck

on:
  # Runs on pull requests
  pull_request:

jobs:
  docker-compose-healthcheck:
    name: Run docker compose healthcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-dockercompose-healthcheck@7cb754b2056cebda6c36db344434f85be398c493 # v1.0.25
        with:
          skip-exited: true # required for keycloakmigration init container
          compose-file-path: "./stack/"
