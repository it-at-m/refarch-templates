name: Docker Compose Healthcheck

on:
  # Runs on pull requests
  pull_request:

jobs:
  docker-compose-healthcheck:
    name: Run docker compose healthcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-dockercompose-healthcheck@94f7e40aa557a2790abfa98a9cc9186d260b94f8 # v1.0.27
        with:
          skip-exited: true # required for keycloakmigration init container
          compose-file-path: "./stack/"
