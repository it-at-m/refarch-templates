# Workflow to assign appropriate labels to PRs
name: pr-labeler
on:
  - pull_request_target

jobs:
  pr-labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write # permission to create labels if not exist
    runs-on: ubuntu-latest
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-pr-labeler@7768a71df3e9e50ca240e2a69a31c4910e1a8ea0 # v1.0.31
