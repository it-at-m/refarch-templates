# Workflow for building NPM/Maven projects and Docker images
name: build

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  # JOB to run change detection
  changes:
    runs-on: ubuntu-latest
    # Required permissions
    permissions:
      pull-requests: read
    outputs:
      # Expose matched filters as job 'packages' output variable
      packages: ${{ steps.filter.outputs.changes }}
    steps:
    - uses: it-at-m/lhm_actions/action-templates/actions/action-checkout@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
    # For pull requests it's not necessary to checkout the code
    - uses: it-at-m/lhm_actions/action-templates/actions/action-filter@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
      id: filter
      with:
        base: ${{ github.ref }}    
        filters: |
          backend: 
           - backend/**
           - .github/workflows/build.yml
          frontend: 
           - frontend/**
           - backend/api-spec/**
           - webcomponent/api-spec/**
           - .github/workflows/build.yml
          webcomponent: 
           - webcomponent/**
           - .github/workflows/build.yml
          eai: 
           - eai/**
           - .github/workflows/build.yml
    - run: |
        echo ${{ toJSON(steps.filter.outputs.changes) }}
  build:
    if: ${{ needs.changes.outputs.packages != '' && needs.changes.outputs.packages != '[]' }}
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TZ: Europe/Berlin
    strategy:
      fail-fast: false
      matrix:
        app-path: ${{ fromJSON(needs.changes.outputs.packages) }}

    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-checkout@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
      - id: node # required for steps.* syntax
        if: ${{ hashFiles(format('./{0}/package.json', matrix.app-path)) != '' }}
        uses: it-at-m/lhm_actions/action-templates/actions/action-npm-build@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
        with:
          app-path: ${{ matrix.app-path }}
      - id: maven # required for steps.* syntax
        if: ${{ hashFiles(format('./{0}/pom.xml', matrix.app-path)) != '' }}
        uses: it-at-m/lhm_actions/action-templates/actions/action-maven-build@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
        with:
          app-path: ${{ matrix.app-path }}
      - if: ${{ github.ref == 'refs/heads/main' && (steps.node.outcome == 'success' || steps.maven.outcome == 'success') }}
        uses: it-at-m/lhm_actions/action-templates/actions/action-build-image@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
        with:
          path: ${{ matrix.app-path }}
          image-name: ${{ matrix.app-path }}
          artifact-name: ${{ join(steps.*.outputs.artifact-name) }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          registry-username: ${{ github.actor }}
          image-tags: |
            type=raw,value=dev
